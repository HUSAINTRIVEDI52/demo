    <!-- Critical CSS inline for faster FCP -->
    <style>
      /* Minimal critical CSS for initial render */
      *,*::before,*::after{box-sizing:border-box}
      html{-webkit-text-size-adjust:100%;line-height:1.5}
      body{margin:0;font-family:system-ui,-apple-system,sans-serif}

  <body>
    <div id="root">
      <!-- Initial loading state shown before React hydrates -->
      <div id="initial-loader" style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:hsl(222 47% 7%);z-index:9999">
        <div style="display:flex;flex-direction:column;align-items:center;gap:24px">
          <!-- Logo SVG -->
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:80px;height:80px">
            <defs>
              <linearGradient id="loaderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="hsl(160 100% 50%)" />
                <stop offset="100%" stop-color="hsl(160 100% 35%)" />
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="36" height="36" rx="10" fill="url(#loaderGrad)" />
            <rect x="9" y="11" width="4" height="18" rx="2" fill="white" opacity="0.95" />
            <path d="M16 11L20 7L24 11L24 29L20 25L16 29Z" fill="white" opacity="0.95" />
            <rect x="27" y="11" width="4" height="18" rx="2" fill="white" opacity="0.95" />
          </svg>
          <!-- Brand text -->
          <div style="font-family:system-ui,-apple-system,sans-serif;font-size:24px;font-weight:700;letter-spacing:-0.5px">
            <span style="color:hsl(210 40% 98%)">Make</span><span style="color:hsl(160 100% 50%)">Portfolio</span>
          </div>
          <!-- Loading dots animation -->
          <div style="display:flex;gap:6px">
            <div style="width:6px;height:6px;border-radius:50%;background:hsl(160 100% 50%);animation:pulse 0.7s ease-in-out infinite"></div>
            <div style="width:6px;height:6px;border-radius:50%;background:hsl(160 100% 50%);animation:pulse 0.7s ease-in-out 0.12s infinite"></div>
            <div style="width:6px;height:6px;border-radius:50%;background:hsl(160 100% 50%);animation:pulse 0.7s ease-in-out 0.24s infinite"></div>
          </div>
        </div>
        <style>
          @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.4; }
            50% { transform: scale(1.4); opacity: 1; }
          }
        </style>
      </div>
    </div>
